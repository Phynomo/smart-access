<nav class="bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 shrink-0 safe-bottom"
  style="box-shadow: 0 -4px 24px rgba(0,0,0,0.06);">

  <div class="flex">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive
        #rla="routerLinkActive"
        class="flex-1 flex flex-col items-center gap-1 py-3 px-1 transition-all duration-200 cursor-pointer select-none"
        [class.text-blue-600]="rla.isActive"
        [class.text-slate-400]="!rla.isActive">

        <!-- Ícono con pill de fondo cuando activo -->
        <div class="relative flex items-center justify-center w-10 h-7">
          @if (rla.isActive) {
            <div class="absolute inset-0 bg-blue-50 dark:bg-blue-950 rounded-xl"></div>
          }
          <i [class]="item.icon + ' text-[1.2rem] relative'"></i>
        </div>

        <span class="text-[10px] leading-none"
          [class.font-semibold]="rla.isActive"
          [class.font-medium]="!rla.isActive">
          {{ item.label }}
        </span>
      </a>
    }
  </div>

</nav>
